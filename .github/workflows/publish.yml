name: Publish Package

on:
  push:
    branches:
      - main # O la rama que uses para producción

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
          scope: '@rubengvillar' # Cambia esto por tu usuario
      - run: pnpm install
      # Esta es la parte importante: auto-incrementa la versión y publica
      - name: Publish
        run: |
          npm version patch --no-git-tag-version # Incrementa versión automáticamente
          pnpm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}